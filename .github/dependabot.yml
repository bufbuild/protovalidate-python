version: 2
# TODO: Remove when uv is officially supported in Dependabot.
# See: https://github.com/dependabot/dependabot-core/issues/10478
enable-beta-ecosystems: true
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"
