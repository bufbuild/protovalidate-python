#:schema https://json.schemastore.org/partial-poe.json

[tasks.bench]
help = "Run benchmarks"
cmd = "pytest --benchmark-enable --benchmark-only --benchmark-autosave"

[tasks.bench-compare]
help = "Compare saved benchmark runs"
cmd = "pytest-benchmark compare --group-by=func,param:_id --sort=name"

[tasks.check]
help = "Run code checks"
sequence = [
  "lint",
  "test",
]

[tasks.diffcheck]
help = "Check for uncommitted or untracked files (guards against codegen regressions)"
shell = "test -z \"$(git status --porcelain | tee /dev/stderr)\""

[tasks.generate]
sequence = [
  "generate-cel",
  "generate-protovalidate",
  "generate-test",
  "format-license-header",
  "format-protos",
]

[tasks.generate-cel]
script = "scripts.generate_cel:main"

[tasks.generate-protovalidate]
script = "scripts.generate_protovalidate:main"

[tasks.generate-test]
sequence = [
  { script = "poethepoet.scripts:rm('test/gen/tests')" },
  { cmd = "buf generate", cwd = "test" },
  { cmd = "fix-protobuf-imports test/gen" },
]

[tasks.format]
help = "Apply all possible auto-formatting to files"
sequence = [
  "format-python",
  "format-protos",
  "format-toml",
  "format-license-header"
]

[tasks.format-license-header]
help = "Add/update license headers in source files"
cmd = "license-header"

[tasks.format-protos]
help = "Apply auto-formatting to protobuf files"
sequence = [
  { cmd = "buf format --write" },
  { cmd = "buf format --write", cwd = "test" },
]

[tasks.format-python]
help = "Apply auto-formatting to Python files"
sequence = [
  { cmd = "ruff check --fix --unsafe-fixes --exit-zero" },
  { cmd = "ruff format" }
]

[tasks.format-toml]
help = "Apply formatting to TOML files"
cmd = "tombi format"

[tasks.lint]
help = "Apply all possible linting to files"
sequence = [
  "lint-python",
  "lint-protos",
  "lint-toml",
  "lint-license-header",
  { cmd = "uv lock --check" }
]

[tasks.lint-license-header]
help = "Check license headers in source files"
cmd = "license-header --check"

[tasks.lint-protos]
help = "Apply linting to protobuf files"
sequence = [
  { cmd = "buf format -d --exit-code" },
  { cmd = "buf format -d --exit-code", cwd = "test" },
]

[tasks.lint-python]
help = "Apply linting to Python files"
sequence = [
  { cmd = "ruff check" },
  { cmd = "ruff format --check" },
  { cmd = "ty check protovalidate" },
]

[tasks.lint-toml]
help = "Apply linting to TOML files"
sequence = [
  { cmd = "tombi format --check" },
  { cmd = "tombi lint" },
]

[tasks.test]
help = "Run unit tests"
cmd = "pytest"
