[project]
site_name = "Protovalidate"
site_url = "https://bufbuild.github.io/protovalidate-python/"
site_description = "Idiomatic Protocol Buffers for Python"
site_author = "Buf Technologies"
copyright = "&copy; Buf Technologies"
repo_url = "https://github.com/bufbuild/protovalidate-python"
nav = ["api.md"]

extra_css = ["stylesheets/extra.css"]

[project.validation]
# mkdocstrings autorefs (`[`ClassName`][module.ClassName]`) are reported as
# unresolved references by zensical; this is a known limitation.
# https://github.com/zensical/zensical/issues/600
unresolved_references = false

[project.theme]
features = ["navigation.indexes", "content.code.copy"]
favicon = "images/favicon.svg"
logo = "images/logos/buf.svg"

[project.theme.icon]
repo = "fontawesome/brands/github"

[project.markdown_extensions.admonition]

[project.markdown_extensions.attr_list]

[project.markdown_extensions.md_in_html]

[project.markdown_extensions.pymdownx.blocks.caption]

[project.markdown_extensions.pymdownx.highlight]
anchor_linenums = true
line_spans = "__span"
pygments_lang_class = true

[project.markdown_extensions.pymdownx.inlinehilite]

[project.markdown_extensions.pymdownx.snippets]

[project.markdown_extensions.pymdownx.superfences]

[project.markdown_extensions.pymdownx.tabbed]
alternate_style = true

[project.plugins.mkdocstrings.handlers.python]
inventories = [
  "https://docs.python.org/3/objects.inv",
  "https://protobufpy.com/objects.inv",
  "https://googleapis.dev/python/protobuf/latest/objects.inv",
]
paths = ["protovalidate"]

[project.plugins.mkdocstrings.handlers.python.options]
docstring_options = { ignore_init_summary = true }
docstring_style = "google"
members_order = "source"
merge_init_into_class = true
overloads_only = true
relative_crossrefs = true
scoped_crossrefs = true
separate_signature = true
signature_crossrefs = true
show_root_heading = true
show_signature = true
show_source = false
