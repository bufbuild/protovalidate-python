# datetime.timedelta only has microsecond precision; sub-microsecond nanosecond values are
# truncated when converting google.protobuf.Duration and google.protobuf.Timestamp to Python.
standard_rules/well_known_types/duration:
 - gte_lte/invalid/above
 - lte/invalid
 - not in/valid
standard_rules/well_known_types/timestamp:
 - gte_lte/invalid/above
 - lte/invalid
# common-expression-language validates field references at runtime, not compile time.
# This test expects a compilation error for a non-existent field reference.
custom_rules:
 - compilation/missing_field
